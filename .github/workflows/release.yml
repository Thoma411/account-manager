name: Draft & Publish Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Decode Android Keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --split-per-abi

      - name: Upload APKs to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/*-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows

      - name: Archive Windows Release
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\x64\runner\vault_keeper_windows.zip

      - name: Upload Windows ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/x64/runner/vault_keeper_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Install Dependencies
        run: flutter pub get

      - name: Build macOS App
        run: flutter build macos --release

      - name: Archive macOS Release
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../vault_keeper_macos.zip accountmanager.app

      - name: Upload macOS ZIP to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/vault_keeper_macos.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-appcast:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate appcast.xml
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          PUB_DATE=$(date -R)
          USERNAME="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"

          WINDOWS_SIZE=$(curl -sI -L "https://github.com/${USERNAME}/${REPO}/releases/download/${TAG_NAME}/vault_keeper_windows.zip" | grep -i 'content-length' | tail -n 1 | awk '{print $2}' | tr -d '\r')
          MACOS_SIZE=$(curl -sI -L "https://github.com/${USERNAME}/${REPO}/releases/download/${TAG_NAME}/vault_keeper_macos.zip" | grep -i 'content-length' | tail -n 1 | awk '{print $2}' | tr -d '\r')
          WINDOWS_SIZE=${WINDOWS_SIZE:-0}
          MACOS_SIZE=${MACOS_SIZE:-0}

          cat <<EOF > appcast.xml
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Vault Keeper Appcast</title>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure url="https://github.com/${USERNAME}/${REPO}/releases/download/${TAG_NAME}/vault_keeper_windows.zip"
                           sparkle:version="${VERSION}"
                           sparkle:os="windows"
                           length="0"
                           type="application/octet-stream" />
              </item>
              <item>
                <title>Version ${VERSION}</title>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure url="https://github.com/${USERNAME}/${REPO}/releases/download/${TAG_NAME}/vault_keeper_macos.zip"
                           sparkle:version="${VERSION}"
                           sparkle:os="macos"
                           length="0"
                           type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Commit and Push appcast.xml back to Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "chore: auto-update appcast.xml to ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin main
